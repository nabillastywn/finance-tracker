<div class="auth-wrapper">

    <!-- Left panel -->
    <div class="auth-left">
        <div class="auth-left-content">
            <div class="auth-logo">
                <span class="logo-icon">
                    <i class="pi pi-wallet"></i>
                </span>
                <span class="logo-text">Finance Tracker</span>
            </div>
            <h1 class="auth-left-title">Kelola keuangan<br />lebih cerdas.</h1>
            <p class="auth-left-desc">Pantau pemasukan, pengeluaran, dan anggaran kamu dengan mudah agar tidak boncos.
            </p>
            <!-- <div class="auth-features">
                <div class="auth-feature-item">
                    <i class="pi pi-check-circle"></i>
                    <span>Lacak transaksi harian</span>
                </div>
                <div class="auth-feature-item">
                    <i class="pi pi-check-circle"></i>
                    <span>Grafik pemasukan vs pengeluaran</span>
                </div>
                <div class="auth-feature-item">
                    <i class="pi pi-check-circle"></i>
                    <span>Kategori anggaran fleksibel</span>
                </div>
                <div class="auth-feature-item">
                    <i class="pi pi-check-circle"></i>
                    <span>Data aman dengan Firebase</span>
                </div>
            </div> -->
        </div>
    </div>

    <!-- Right panel -->
    <div class="auth-right">
        <div class="auth-card">
            <div class="auth-card-header">
                <h2 class="center">Selamat Datang!</h2>
                <!-- <p>Masuk ke akun kamu untuk melanjutkan</p> -->
            </div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-icon-wrapper">
                        <i class="pi pi-envelope input-icon"></i>
                        <input type="email" formControlName="email" placeholder="email@contoh.com" />
                    </div>
                    <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                        Email tidak valid
                    </span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon-wrapper">
                        <i class="pi pi-lock input-icon"></i>
                        <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                            placeholder="Minimal 6 karakter" />
                        <i class="pi input-icon-right" [class.pi-eye]="!showPassword"
                            [class.pi-eye-slash]="showPassword" (click)="showPassword = !showPassword">
                        </i>
                    </div>
                    <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
                        Password minimal 6 karakter
                    </span>
                </div>

                <div class="error-box" *ngIf="errorMessage">
                    <i class="pi pi-exclamation-circle"></i>
                    <span>{{ errorMessage }}</span>
                </div>

                <button type="submit" [disabled]="loading" class="btn-submit">
                    <span *ngIf="loading" class="btn-spinner">Masuk...</span>
                    <span *ngIf="!loading">
                        <i class="pi pi-sign-in"></i> Masuk
                    </span>
                </button>
            </form>

            <div class="auth-divider">
                <span>atau</span>
            </div>

            <div class="auth-card-footer">
                <p>Belum punya akun?
                    <a routerLink="/register">Daftar sekarang</a>
                </p>
            </div>
        </div>
    </div>

</div>
