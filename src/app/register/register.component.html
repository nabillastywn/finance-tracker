<div class="auth-container">
    <div class="auth-card">
        <h2 class="center">Daftar</h2>

        <div class="success-box" *ngIf="successMessage">
            <p>{{ successMessage }}</p>
            <a routerLink="/login">Ke halaman login</a>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
            <div class="form-group">
                <label>Email</label>
                <input type="email" formControlName="email" placeholder="email@contoh.com" />
                <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                    Email tidak valid
                </span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" formControlName="password" placeholder="Minimal 6 karakter" />
                <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
                    Password minimal 6 karakter
                </span>
            </div>
            <span class="error" *ngIf="errorMessage">{{ errorMessage }}</span>
            <button type="submit" [disabled]="loading">
                <span *ngIf="loading" class="btn-spinner">Mendaftar...</span>
                <span *ngIf="!loading">Daftar</span>
            </button>
        </form>

        <p *ngIf="!successMessage">Sudah punya akun? <a routerLink="/login">Masuk di sini</a></p>
    </div>
</div>
